<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matchbox — Command Desk</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-primary: #020617;
            --bg-secondary: #0a0e1a;
            --bg-card: rgba(15, 23, 42, 0.6);
            --accent-primary: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        body { 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 0; 
            min-height: 100vh;
        }

        .dashboard-container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 30px 15px;
            display: none;
        }

        /* Login Overlay */
        #adminLoginOverlay { 
            position: fixed; inset: 0; 
            background: var(--bg-primary); 
            z-index: 10000; 
            display: flex; align-items: center; justify-content: center; 
        }
        .login-card { 
            background: var(--bg-secondary); 
            padding: 40px; 
            border-radius: var(--radius-lg); 
            border: 1px solid var(--accent-primary);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
            width: 100%; max-width: 400px; text-align: center; 
        }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; font-weight: 800; }
        .input-field { 
            width: 100%; padding: 14px; 
            background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border-subtle); 
            border-radius: var(--radius-md); color: white; outline: none; box-sizing: border-box;
        }
        .input-field:focus { border-color: var(--accent-primary); }

        .btn { 
            padding: 14px 24px; border-radius: var(--radius-md); border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-family: inherit; transition: 0.3s;
        }
        .btn-primary { background: var(--accent-primary); color: #020617; width: 100%; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--accent-glow); }

        /* Dashboard Styles */
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .dashboard-header h1 { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; color: var(--accent-primary); margin: 0; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 25px; border-radius: var(--radius-lg); position: relative; }
        .stat-card::after { content: ''; position: absolute; top: 0; left: 0; height: 100%; width: 4px; background: var(--accent-primary); box-shadow: 0 0 10px var(--accent-primary); }
        .stat-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        .stat-value { display: block; font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--accent-primary); margin-top: 10px; }

        .panel { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 25px; margin-bottom: 30px; }
        .panel-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 20px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 10px; color: var(--accent-primary); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: var(--text-secondary); font-size: 0.75rem; text-transform: uppercase; border-bottom: 2px solid var(--border-subtle); }
        td { padding: 15px; border-bottom: 1px solid var(--border-subtle); font-size: 0.9rem; }
        .badge { padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 0.7rem; }
        .badge.match { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge.mismatch { background: rgba(239, 68, 68, 0.1); color: var(--error); }

        .filters { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-item { flex: 1; min-width: 150px; }

        #toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; background: #fff; color: #000; font-weight: 700; display: none; z-index: 10001; }
    </style>
</head>
<body>

    <div id="adminLoginOverlay">
        <div class="login-card" id="loginCard" style="display: none;">
            <h2 style="font-family: 'Orbitron', sans-serif; color: var(--accent-primary);">RESTRICTED</h2>
            <p style="color: var(--text-secondary); margin-bottom: 30px; font-size: 0.8rem;">ADMIN AUTHORIZATION REQUIRED</p>
            <div class="input-group">
                <label>Admin Email</label>
                <input type="email" id="adminEmail" class="input-field" placeholder="admin@matchbox.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="adminPass" class="input-field" placeholder="••••••••">
            </div>
            <button onclick="handleLogin()" class="btn btn-primary" id="loginBtn">Authorize Desk</button>
            <p id="loginError" style="color: var(--error); font-size: 0.8rem; margin-top: 15px; display: none;"></p>
        </div>
        <div id="authLoader" style="text-align: center;">
            <div style="width: 40px; height: 40px; border: 4px solid var(--accent-primary); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
            <p style="font-family: 'Orbitron', sans-serif; font-size: 0.8rem; letter-spacing: 2px;">VERIFYING CREDENTIALS...</p>
        </div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <div class="dashboard-container" id="dashboard">
        <header class="dashboard-header">
            <h1>Command Desk</h1>
            <button onclick="handleLogout()" class="btn" style="background: rgba(239, 68, 68, 0.1); color: var(--error);">Logout</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Total Scans</span>
                <span class="stat-value" id="statTotal">0</span>
            </div>
            <div class="stat-card" style="--accent-primary: #10b981;">
                <span class="stat-label">Match Rate</span>
                <span class="stat-value" id="statAccuracy">0%</span>
            </div>
            <div class="stat-card" style="--accent-primary: #f97316;">
                <span class="stat-label">Active Users</span>
                <span class="stat-value" id="statUsers">0</span>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">Add New Operator / Admin</div>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="newUserFull" class="input-field" placeholder="e.g. John Doe">
                </div>
                <div class="input-group">
                    <label>Email ID</label>
                    <input type="email" id="newUserEmail" class="input-field" placeholder="staff@matchbox.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="text" id="newUserPass" class="input-field" placeholder="Min 6 chars">
                </div>
                <div class="input-group">
                    <label>Role</label>
                    <select id="newUserRole" class="input-field">
                        <option value="user">Operator</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>
            </div>
            <button onclick="addUser()" class="btn btn-primary" style="margin-top: 10px;" id="addUserBtn">Create User & Profile</button>
        </div>

        <div class="panel">
            <div class="panel-title">Activity Monitor</div>
            <div class="filters">
                <div class="filter-item">
                    <label style="font-size: 0.7rem; color: var(--text-secondary); display: block; margin-bottom: 5px;">RESULT</label>
                    <select id="filterResult" class="input-field" onchange="fetchScans()">
                        <option value="ALL">ALL RECORDS</option>
                        <option value="MATCH">SUCCESS ONLY</option>
                        <option value="MISMATCH">FAILURES ONLY</option>
                    </select>
                </div>
                <div class="filter-item">
                     <label style="font-size: 0.7rem; color: var(--text-secondary); display: block; margin-bottom: 5px;">ACTION</label>
                    <button onclick="exportCSV()" class="btn" style="background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border-subtle); width: 100%;">Export CSV</button>
                </div>
            </div>
            <div style="overflow-x: auto;">
                <table id="scanTable">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Operator</th>
                            <th>Carton</th>
                            <th>Label</th>
                            <th>Result</th>
                        </tr>
                    </thead>
                    <tbody id="scanTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const SUPABASE_URL = "https://sfndxujqzdybmquoqxmj.supabase.co";
        const SUPABASE_KEY = "sb_publishable_5zenHgExDRDkr6o20UVgOg_4mt7bV2z";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const loginOverlay = document.getElementById('adminLoginOverlay');
        const loginCard = document.getElementById('loginCard');
        const authLoader = document.getElementById('authLoader');
        const dashboard = document.getElementById('dashboard');
        let currentScans = [];

        async function checkSession() {
            try {
                const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                
                if (session) {
                    const { data: profile, error: profError } = await supabase
                        .from('profiles')
                        .select('role')
                        .eq('id', session.user.id)
                        .single();
                    
                    if (!profError && profile && (profile.role || '').toLowerCase() === 'admin') {
                        initDashboard();
                        return;
                    }
                }
                
                // If no session or not admin, show login card
                authLoader.style.display = 'none';
                loginCard.style.display = 'block';
            } catch (e) {
                console.error("Session check failed:", e);
                authLoader.style.display = 'none';
                loginCard.style.display = 'block';
            }
        }

        async function handleLogin() {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');

            if (!email || !pass) {
                err.innerText = "Please enter both credentials.";
                err.style.display = "block";
                return;
            }

            btn.innerText = "AUTHORIZING...";
            btn.disabled = true;
            err.style.display = "none";

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
                if (error) throw error;

                const { data: profile } = await supabase.from('profiles').select('role').eq('id', data.user.id).single();
                if (!profile || (profile.role || '').toLowerCase() !== 'admin') {
                    await supabase.auth.signOut();
                    throw new Error("ACCESS DENIED: Administrator role required.");
                }

                showToast("Access Granted.", "success");
                initDashboard();
            } catch (e) {
                err.innerText = e.message;
                err.style.display = "block";
                btn.disabled = false;
                btn.innerText = "Authorize Desk";
            }
        }

        function initDashboard() {
            loginOverlay.style.display = "none";
            dashboard.style.display = "block";
            fetchStats();
            fetchScans();
        }

        async function fetchStats() {
            try {
                const { data: scans } = await supabase.from('scans').select('*');
                const { data: profiles } = await supabase.from('profiles').select('id');

                if (scans) {
                    document.getElementById('statTotal').innerText = scans.length;
                    const matches = scans.filter(s => s.result === 'MATCH').length;
                    const accuracy = scans.length > 0 ? ((matches / scans.length) * 100).toFixed(1) : 0;
                    document.getElementById('statAccuracy').innerText = accuracy + '%';
                }
                if (profiles) {
                    document.getElementById('statUsers').innerText = profiles.length;
                }
            } catch (e) { console.error("Stats fetch error:", e); }
        }

        async function fetchScans() {
            const resFilter = document.getElementById('filterResult').value;
            let query = supabase.from('scans').select('*').order('created_at', { ascending: false }).limit(200);
            
            if (resFilter !== 'ALL') {
                query = query.eq('result', resFilter);
            }

            const { data, error } = await query;
            if (data) {
                currentScans = data;
                renderTable(data);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('scanTableBody');
            tbody.innerHTML = data.map(row => `
                <tr>
                    <td style="font-size: 0.75rem; color: var(--text-secondary);">${new Date(row.created_at).toLocaleString()}</td>
                    <td style="font-weight: 700;">${row.scanned_by || 'Unknown'}</td>
                    <td style="font-family: monospace; color: var(--accent-primary);">${row.carton_barcode}</td>
                    <td style="font-family: monospace;">${row.label_barcode}</td>
                    <td><span class="badge ${row.result.toLowerCase()}">${row.result}</span></td>
                </tr>
            `).join('');
        }

        async function addUser() {
            const full_name = document.getElementById('newUserFull').value;
            const email = document.getElementById('newUserEmail').value;
            const password = document.getElementById('newUserPass').value;
            const role = document.getElementById('newUserRole').value;
            const btn = document.getElementById('addUserBtn');

            if (!email || !password || !full_name) {
                showToast("Fill all blanks", "error");
                return;
            }

            btn.innerText = "PROVISIONING...";
            btn.disabled = true;

            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: { data: { full_name, role } }
                });

                if (error) throw error;

                const { error: profError } = await supabase.from('profiles').insert([
                    { id: data.user.id, username: email.split('@')[0], full_name, email, role }
                ]);

                if (profError) throw profError;

                showToast("Staff Member Added!", "success");
                document.getElementById('newUserFull').value = '';
                document.getElementById('newUserEmail').value = '';
                document.getElementById('newUserPass').value = '';
                fetchStats();
            } catch (e) {
                showToast(e.message, "error");
            } finally {
                btn.disabled = false;
                btn.innerText = "Create User & Profile";
            }
        }

        function handleLogout() {
            supabase.auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }

        function exportCSV() {
            if (currentScans.length === 0) return;
            let csv = "Timestamp,Operator,Carton,Label,Result\n";
            currentScans.forEach(r => {
                csv += `"${new Date(r.created_at).toLocaleString()}","${r.scanned_by}","${r.carton_barcode}","${r.label_barcode}","${r.result}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `matchbox_audit_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }

        function showToast(msg, type = "success") {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.background = type === "success" ? "#10b981" : "#ef4444";
            toast.style.color = "white";
            toast.style.display = "block";
            setTimeout(() => toast.style.display = "none", 3000);
        }

        // Start session check on load with a safety timeout
        const authTimeout = setTimeout(() => {
            if (authLoader.style.display !== 'none') {
                console.warn("Auth check timed out - showing login");
                authLoader.style.display = 'none';
                loginCard.style.display = 'block';
            }
        }, 3500);

        checkSession().then(() => clearTimeout(authTimeout));
    </script>
</body>
</html>
