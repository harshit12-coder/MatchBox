<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="canvas"></canvas>
<script>
const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

sizes.forEach(size => {
    canvas.width = size;
    canvas.height = size;
    
    // Background gradient
    const bgGrad = ctx.createLinearGradient(0, 0, size, size);
    bgGrad.addColorStop(0, '#6366f1');
    bgGrad.addColorStop(1, '#8b5cf6');
    
    // Rounded rect background
    const r = size * 0.21;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = bgGrad;
    ctx.fill();

    // Box icon
    const cx = size * 0.5;
    const cy = size * 0.42;
    const bw = size * 0.24;
    const bh = size * 0.2;
    
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = Math.max(2, size * 0.016);
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';

    // 3D box
    ctx.beginPath();
    ctx.moveTo(cx, cy - bh);
    ctx.lineTo(cx + bw, cy - bh * 0.5);
    ctx.lineTo(cx + bw, cy + bh * 0.6);
    ctx.lineTo(cx, cy + bh * 1.1);
    ctx.lineTo(cx - bw, cy + bh * 0.6);
    ctx.lineTo(cx - bw, cy - bh * 0.5);
    ctx.closePath();
    ctx.stroke();

    // Box middle lines
    ctx.beginPath();
    ctx.moveTo(cx, cy - bh);
    ctx.lineTo(cx, cy + bh * 1.1);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx - bw, cy - bh * 0.5);
    ctx.lineTo(cx, cy);
    ctx.lineTo(cx + bw, cy - bh * 0.5);
    ctx.stroke();

    // Check circle
    const checkX = cx + size * 0.14;
    const checkY = cy + size * 0.24;
    const checkR = size * 0.14;
    
    ctx.beginPath();
    ctx.arc(checkX, checkY, checkR, 0, Math.PI * 2);
    ctx.fillStyle = '#10b981';
    ctx.fill();

    // Checkmark
    ctx.beginPath();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = Math.max(2, size * 0.022);
    const s = checkR * 0.55;
    ctx.moveTo(checkX - s * 0.6, checkY);
    ctx.lineTo(checkX - s * 0.1, checkY + s * 0.5);
    ctx.lineTo(checkX + s * 0.65, checkY - s * 0.5);
    ctx.stroke();

    // Download
    const link = document.createElement('a');
    link.download = `icon-${size}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
});

document.body.innerHTML = '<h1>Icons generated! Check your downloads folder.</h1><p>Move the downloaded icon-*.png files to your icons/ folder.</p>';
</script>
</body>
</html>
