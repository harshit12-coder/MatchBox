<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="box" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect x="20" y="20" width="472" height="472" rx="90" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <!-- Box/Carton icon -->
  <g transform="translate(256, 230)" filter="url(#glow)">
    <path d="M0 -100 L120 -50 L120 60 L0 110 L-120 60 L-120 -50 Z" fill="none" stroke="url(#box)" stroke-width="8" stroke-linejoin="round"/>
    <path d="M0 -100 L0 110" stroke="url(#box)" stroke-width="5" opacity="0.5"/>
    <path d="M-120 -50 L0 0 L120 -50" fill="none" stroke="url(#box)" stroke-width="5" opacity="0.5"/>
  </g>
  <!-- Checkmark -->
  <g transform="translate(280, 310)" filter="url(#glow)">
    <circle cx="30" cy="30" r="50" fill="rgba(16,185,129,0.25)"/>
    <circle cx="30" cy="30" r="40" fill="#10b981"/>
    <polyline points="8,30 25,47 52,13" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
